set default=0

if [ x$feature_default_cont_path = xy ] ; then
	font=unicode
else
	font=$prefix/unicode.pf2
fi

if loadfont $font ; then
	set gfxmode=800x600
	set gfxpayload=keep
	insmod efi_gop
	insmod efi_uga
	insmod video_bochs
	insmod video_cirrus
else
	set gfxmode=auto
	insmod all_video
fi

insmod gfxterm
insmod png
terminal_output gfxterm


